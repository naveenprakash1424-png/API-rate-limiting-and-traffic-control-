<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#ffffff,#eaf4ff);
        }

        .reset-container{
            width:400px;
            background:white;
            padding:35px;
            border-radius:18px;
            box-shadow:0 10px 30px rgba(0,0,0,0.12);
            border:1px solid #dcecff;
            text-align:center;
        }

        .shield{
            font-size:50px;
            color:#0d6efd;
            margin-bottom:10px;
        }

        h2{
            color:#1b2a41;
            margin-bottom:8px;
        }

        .subtitle{
            color:#6c757d;
            font-size:14px;
            margin-bottom:25px;
            line-height:1.5;
        }

        .flash{
            color:#dc3545;
            margin-bottom:15px;
            font-size:14px;
        }

        input{
            width:100%;
            padding:13px;
            margin:10px 0;
            border:1px solid #cfd9e6;
            border-radius:10px;
            outline:none;
            background:#f8fbff;
            transition:0.3s;
        }

        input:focus{
            border-color:#0d6efd;
            box-shadow:0 0 8px rgba(13,110,253,0.2);
        }

        button{
            width:100%;
            padding:13px;
            margin-top:15px;
            border:none;
            border-radius:10px;
            background:#0d6efd;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
            font-weight:bold;
        }

        button:hover{
            background:#0b5ed7;
        }

        .links{
            margin-top:20px;
        }

        .links a{
            text-decoration:none;
            color:#0d6efd;
            font-size:14px;
            transition:0.3s;
        }

        .links a:hover{
            color:#084298;
            text-decoration:underline;
        }
    </style>
</head>
<body>

<div class="reset-container">

    <div class="shield">🔒</div>

    <h2>Reset Password</h2>

    <p class="subtitle">
        Create a new secure password to protect your account.
    </p>

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}
                <p class="flash">{{ msg }}</p>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">

        <input type="password"
               name="password"
               placeholder="New Password"
               required>

        <button type="submit">
            Reset Password
        </button>

    </form>

    <div class="links">
        <a href="/login">Back to Login</a>
    </div>

</div>

</body>
</html>
